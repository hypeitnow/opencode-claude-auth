name: Publish to npm (tag push)

# Safety net for direct tag pushes (e.g. `git push origin v1.6.14`).
# The normal release flow goes through release.yml → release-please → tag push
# → this job. The two publish jobs are gated on mutually exclusive conditions
# so only one will run for any given tag.

on:
  push:
    tags:
      - "v*"

# Skip if release.yml is also running for this tag.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
