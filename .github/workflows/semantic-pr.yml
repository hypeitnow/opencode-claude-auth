name: Semantic PR

# Validates that PR titles follow Conventional Commits.
# Uses `pull_request` (read-only) — safe for forks. Do NOT switch to
# `pull_request_target` here: this repo accepts PRs from forks, and
# `pull_request_target` would execute the workflow with write access
# against untrusted fork code.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
