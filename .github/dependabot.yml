version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    reviewers:
      - "hypeitnow"
    labels:
      - "dependencies"
    groups:
      production-and-development:
        dependency-type: "production"
      development:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 3
    reviewers:
      - "hypeitnow"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci(actions)"
